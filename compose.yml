services:
  web:
    build: .
    container_name: article_web 
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - images_volume:/var/www/html/images/articles
    depends_on:
      - article_db
  article_db:
    image: mysql:8.0
    container_name: article_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: article_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - ./sql/init_base.sql:/docker-entrypoint-initdb.d/init_base.sql
      - sql:/var/lib/mysql

volumes:
  sql:
  images_volume:
